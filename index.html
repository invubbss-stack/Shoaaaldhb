<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ركن الجليد للعصائر والكنافة — شاشة منيو رقمية فاخرة ومتجددة من ملفات JSON." />
  <meta name="theme-color" content="#FAFAF7" />
  <title>ركن الجليد للعصائر والكنافة | Al-Jaleed Corner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root {
      --bg: #FAFAF7;
      --card: #FFFFFF;
      --primary: #6BAF45;
      --secondary: #F9A826;
      --accent: #FF7A00;
      --wood: #C79A63;
      --text: #222222;
      --muted: #777777;
      --border: rgba(0, 0, 0, .05);
      --shadow: 0 28px 80px rgba(64, 45, 20, .12);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: 'Cairo', 'IBM Plex Sans Arabic', sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
    }
    img { display: block; max-width: 100%; }
    button { font: inherit; }

    .app {
      position: relative;
      min-height: 100vh;
      padding: 24px 34px 104px;
      isolation: isolate;
      background:
        radial-gradient(circle at 9% 16%, rgba(255, 122, 0, .14), transparent 28%),
        radial-gradient(circle at 84% 8%, rgba(107, 175, 69, .16), transparent 30%),
        linear-gradient(135deg, #fffefa 0%, #fafaf7 45%, #fff6e7 100%);
    }

    .marble {
      position: fixed;
      inset: 0;
      z-index: -3;
      opacity: .7;
      background-image:
        linear-gradient(115deg, transparent 0 45%, rgba(199, 154, 99, .08) 46%, transparent 48%),
        linear-gradient(20deg, transparent 0 65%, rgba(107, 175, 69, .06) 66%, transparent 68%);
    }
    .sun { position: fixed; width: 44vw; height: 44vw; left: -12vw; top: -20vw; border-radius: 50%; background: radial-gradient(circle, rgba(249,168,38,.35), transparent 62%); z-index: -2; filter: blur(2px); }
    .leaf-orb { position: fixed; width: 34vw; height: 34vw; right: -10vw; bottom: 8vh; border-radius: 42% 58% 50% 50%; background: linear-gradient(145deg, rgba(107,175,69,.12), rgba(255,255,255,.28)); z-index: -2; }

    .topbar, .hero, .category-tabs, .card, .bottombar {
      background: rgba(255, 255, 255, .78);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .topbar {
      height: 86px;
      border-radius: 32px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 28px;
      padding: 14px 22px;
    }
    .brand { display: flex; align-items: center; gap: 14px; min-width: 320px; }
    .logo-mark { width: 58px; height: 58px; border-radius: 20px; display: grid; place-items: center; font-size: 30px; color: white; background: linear-gradient(145deg, var(--primary), var(--accent)); box-shadow: 0 18px 34px rgba(107,175,69,.25); }
    .brand h1 { margin: 0; font-size: clamp(24px, 2vw, 34px); line-height: 1; font-weight: 900; }
    .brand p { margin: 6px 0 0; color: var(--muted); font-size: 14px; font-family: 'IBM Plex Sans Arabic', sans-serif; }
    .promo-rail { overflow: hidden; height: 42px; border-radius: 999px; background: rgba(250, 250, 247, .72); border: 1px solid var(--border); display: flex; align-items: center; }
    .promo-track { display: flex; gap: 28px; white-space: nowrap; will-change: transform; }
    .promo-pill { font-weight: 800; color: var(--text); }
    .top-actions { display: flex; align-items: center; gap: 12px; }
    .datebox { text-align: left; min-width: 150px; }
    .time { font-size: 26px; font-weight: 900; letter-spacing: -.5px; }
    .date { color: var(--muted); font-size: 13px; }
    .icon-btn { border: 0; width: 46px; height: 46px; border-radius: 16px; color: var(--text); background: white; box-shadow: 0 10px 24px rgba(0,0,0,.06); }

    .shell { display: grid; grid-template-columns: minmax(430px, 42vw) 1fr; gap: 26px; margin-top: 24px; height: calc(100vh - 238px); min-height: 560px; }
    .hero { position: relative; border-radius: 44px; overflow: hidden; padding: 34px; display: grid; align-content: space-between; }
    .hero-bg { position: absolute; inset: 0; z-index: -1; transition: background .6s ease; }
    .hero::after { content: ''; position: absolute; inset: auto -12% -22% -12%; height: 42%; background: linear-gradient(90deg, rgba(199,154,99,.18), rgba(255,255,255,.08)); filter: blur(28px); }
    .season { width: max-content; padding: 10px 18px; border-radius: 999px; background: rgba(255,255,255,.72); color: var(--accent); font-weight: 900; border: 1px solid rgba(255,122,0,.12); }
    .hero-copy h2 { margin: 0; font-size: clamp(48px, 5vw, 82px); line-height: 1.02; font-weight: 900; letter-spacing: -2px; }
    .hero-copy p { margin: 18px 0 0; max-width: 540px; color: var(--muted); font-size: clamp(18px, 1.45vw, 27px); line-height: 1.7; }
    .hero-price { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
    .price-chip { padding: 10px 16px; border-radius: 18px; background: #fff; border: 1px solid var(--border); font-weight: 900; box-shadow: 0 16px 34px rgba(0,0,0,.07); }
    .hero-photo-wrap { position: absolute; left: 5%; bottom: 7%; width: min(48%, 390px); aspect-ratio: 1; border-radius: 42px; padding: 14px; background: rgba(255,255,255,.62); box-shadow: 0 40px 90px rgba(64,45,20,.16); }
    .hero-photo { width: 100%; height: 100%; object-fit: cover; border-radius: 34px; }

    .category-tabs { border-radius: 30px; padding: 12px; display: flex; gap: 10px; overflow-x: auto; margin-bottom: 18px; }
    .tab { flex: 0 0 auto; border: 0; border-radius: 22px; padding: 12px 18px; background: rgba(255,255,255,.74); color: var(--muted); font-weight: 900; cursor: pointer; transition: transform .25s ease, color .25s ease, background .25s ease; }
    .tab.active { color: white; background: linear-gradient(135deg, var(--primary), var(--accent)); transform: translateY(-2px); box-shadow: 0 16px 34px rgba(107,175,69,.22); }
    .menu-panel { height: 100%; display: flex; flex-direction: column; min-width: 0; }
    .grid { flex: 1; overflow: auto; padding: 6px 6px 20px; display: grid; grid-template-columns: repeat(3, minmax(220px, 1fr)); gap: 16px; scroll-behavior: smooth; }
    .grid::-webkit-scrollbar { width: 8px; }
    .grid::-webkit-scrollbar-thumb { background: rgba(107,175,69,.28); border-radius: 99px; }
    .card { position: relative; border-radius: 30px; overflow: hidden; min-height: 344px; padding: 14px; transform: translateZ(0); }
    .card-image { height: 154px; border-radius: 24px; overflow: hidden; background: #f8f1e8; }
    .card-image img { width: 100%; height: 100%; object-fit: cover; transform: scale(1.03); }
    .badges { position: absolute; top: 24px; right: 24px; display: flex; gap: 6px; z-index: 2; }
    .badge { padding: 6px 10px; border-radius: 999px; color: white; font-size: 12px; font-weight: 900; box-shadow: 0 10px 20px rgba(0,0,0,.12); }
    .badge.bestSeller { background: linear-gradient(135deg, var(--secondary), var(--accent)); }
    .badge.new { background: linear-gradient(135deg, var(--primary), #8bd36b); }
    .card h3 { margin: 14px 0 6px; font-size: 24px; line-height: 1.2; }
    .card p { margin: 0; color: var(--muted); line-height: 1.6; min-height: 50px; }
    .meta { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; color: var(--muted); font-weight: 800; }
    .sizes { display: flex; gap: 7px; flex-wrap: wrap; }
    .size { flex: 1 0 auto; min-width: 58px; padding: 8px 9px; border-radius: 14px; background: rgba(250,250,247,.9); border: 1px solid var(--border); text-align: center; font-weight: 900; }
    .size b { display: block; color: var(--accent); font-size: 18px; }

    .bottombar { position: fixed; right: 34px; left: 34px; bottom: 22px; min-height: 70px; border-radius: 28px; display: grid; grid-template-columns: 1fr auto auto auto; align-items: center; gap: 20px; padding: 12px 18px; }
    .contact { display: flex; gap: 22px; align-items: center; flex-wrap: wrap; font-weight: 900; }
    .muted { color: var(--muted); font-weight: 700; }
    .whatsapp { display: inline-flex; align-items: center; gap: 9px; padding: 13px 18px; border-radius: 18px; background: linear-gradient(135deg, #23c466, var(--primary)); color: white; text-decoration: none; font-weight: 900; box-shadow: 0 16px 30px rgba(35,196,102,.24); }
    .qr { width: 58px; height: 58px; border-radius: 15px; background: white; padding: 5px; border: 1px solid var(--border); }

    @media (max-width: 1300px) { .grid { grid-template-columns: repeat(2, minmax(220px, 1fr)); } .shell { grid-template-columns: 40vw 1fr; } }
    @media (max-width: 900px) { body { overflow: auto; } .app { padding: 14px 14px 130px; } .topbar, .shell, .bottombar { grid-template-columns: 1fr; height: auto; } .top-actions, .brand, .contact { justify-content: center; } .shell { min-height: 0; } .hero { min-height: 640px; } .hero-photo-wrap { width: 58%; } .grid { grid-template-columns: 1fr; overflow: visible; } .bottombar { right: 14px; left: 14px; } }
  </style>
</head>
<body>
  <main class="app" id="app">
    <div class="marble"></div><div class="sun"></div><div class="leaf-orb"></div>

    <header class="topbar">
      <section class="brand" aria-label="هوية المتجر">
        <div class="logo-mark" id="logo">🧊</div>
        <div><h1 id="brand-ar">ركن الجليد</h1><p id="brand-en">Al-Jaleed Corner for Juices & Kunafa</p></div>
      </section>
      <section class="promo-rail" aria-label="العروض"><div class="promo-track" id="promo-track"></div></section>
      <section class="top-actions" aria-label="أدوات الشاشة">
        <div class="datebox"><div class="time" id="time">--:--</div><div class="date" id="date">--</div></div>
        <button class="icon-btn" aria-label="بحث">⌕</button><button class="icon-btn" aria-label="تبديل اللغة">EN</button>
      </section>
    </header>

    <section class="shell">
      <aside class="hero" id="hero">
        <div class="hero-bg" id="hero-bg"></div>
        <div class="season" id="season">عرض موسمي</div>
        <div class="hero-copy"><h2 id="hero-title"></h2><p id="hero-subtitle"></p><div class="hero-price" id="hero-prices"></div></div>
        <div class="hero-photo-wrap"><img class="hero-photo" id="hero-image" alt="منتج مميز" /></div>
      </aside>
      <section class="menu-panel">
        <nav class="category-tabs" id="category-tabs" aria-label="تصنيفات المنيو"></nav>
        <div class="grid" id="products-grid" aria-live="polite"></div>
      </section>
    </section>

    <footer class="bottombar">
      <div class="contact"><span id="phone"></span><span id="delivery"></span><span class="muted" id="address"></span></div>
      <a class="whatsapp" id="whatsapp" target="_blank" rel="noreferrer">واتساب الآن</a>
      <span class="muted">امسح للطلب</span>
      <img class="qr" id="qr" alt="QR Code للمنيو" />
    </footer>
  </main>

  <script>
    const state = { categories: [], products: [], offers: [], settings: {}, activeCategory: 'juices', heroIndex: 0, heroTimer: null };
    const els = {
      brandAr: document.getElementById('brand-ar'), brandEn: document.getElementById('brand-en'), promo: document.getElementById('promo-track'),
      time: document.getElementById('time'), date: document.getElementById('date'), tabs: document.getElementById('category-tabs'), grid: document.getElementById('products-grid'),
      hero: document.getElementById('hero'), heroBg: document.getElementById('hero-bg'), heroTitle: document.getElementById('hero-title'), heroSubtitle: document.getElementById('hero-subtitle'),
      heroPrices: document.getElementById('hero-prices'), heroImage: document.getElementById('hero-image'), season: document.getElementById('season'), phone: document.getElementById('phone'),
      delivery: document.getElementById('delivery'), address: document.getElementById('address'), whatsapp: document.getElementById('whatsapp'), qr: document.getElementById('qr')
    };

    const badgeLabels = { bestSeller: 'الأكثر طلباً', new: 'جديد' };

    async function loadJson(path) {
      const response = await fetch(path, { cache: 'no-store' });
      if (!response.ok) throw new Error(`Unable to load ${path}`);
      return response.json();
    }

    function lowestPrice(product) { return Math.min(...product.sizes.map((size) => size.price)); }
    function categoryById(id) { return state.categories.find((category) => category.id === id) || state.categories[0]; }
    function productsForActiveCategory() { return state.products.filter((product) => product.categoryId === state.activeCategory); }
    function featuredProducts() { return state.products.filter((product) => product.featured) || state.products.slice(0, 5); }

    function formatSizes(product) {
      return product.sizes.map((size) => `<span class="size">${size.label}<b>${size.price} ${state.settings.currency}</b></span>`).join('');
    }

    function renderOffers() {
      const repeated = [...state.offers, ...state.offers];
      els.promo.innerHTML = repeated.map((offer) => `<span class="promo-pill">${offer.label}</span>`).join('');
      gsap.to(els.promo, { xPercent: 50, duration: 28, ease: 'none', repeat: -1 });
    }

    function renderSettings() {
      els.brandAr.textContent = state.settings.brandAr;
      els.brandEn.textContent = state.settings.brandEn;
      els.season.textContent = state.settings.seasonalBadge;
      els.phone.textContent = `☎ ${state.settings.phone}`;
      els.delivery.textContent = state.settings.delivery;
      els.address.textContent = state.settings.addressLines.join(' — ');
      els.whatsapp.href = `https://wa.me/${state.settings.whatsapp}`;
      els.qr.src = state.settings.qrUrl;
      gsap.to('#logo', { y: -4, scale: 1.04, duration: 1.8, ease: 'sine.inOut', repeat: -1, yoyo: true });
    }

    function renderTabs() {
      els.tabs.innerHTML = state.categories.map((category) => `<button class="tab ${category.id === state.activeCategory ? 'active' : ''}" data-id="${category.id}">${category.emoji} ${category.nameAr}</button>`).join('');
      els.tabs.querySelectorAll('.tab').forEach((tab) => tab.addEventListener('click', () => setCategory(tab.dataset.id)));
    }

    function renderProducts() {
      const products = productsForActiveCategory();
      els.grid.innerHTML = products.map((product) => `
        <article class="card">
          <div class="badges">${(product.badges || []).map((badge) => `<span class="badge ${badge}">${badgeLabels[badge]}</span>`).join('')}</div>
          <div class="card-image"><img src="${product.image}" alt="${product.nameAr}" loading="lazy" decoding="async"></div>
          <h3>${product.nameAr}</h3>
          <p>${product.descriptionAr}</p>
          <div class="meta"><span>${product.calories} سعرة</span><span>يبدأ من ${lowestPrice(product)} ${state.settings.currency}</span></div>
          <div class="sizes">${formatSizes(product)}</div>
        </article>`).join('');

      gsap.fromTo('.card', { y: 28, opacity: 0, filter: 'blur(8px)' }, { y: 0, opacity: 1, filter: 'blur(0px)', duration: .75, stagger: .045, ease: 'power3.out' });
      gsap.to('.card', { y: -5, duration: 2.8, ease: 'sine.inOut', stagger: .14, repeat: -1, yoyo: true });
    }

    function renderHero(product) {
      const category = categoryById(product.categoryId);
      els.heroBg.style.background = category.gradient;
      els.heroTitle.textContent = product.nameAr;
      els.heroSubtitle.textContent = `${product.descriptionAr} — ${category.atmosphere}`;
      els.heroImage.src = product.image;
      els.heroImage.alt = product.nameAr;
      els.heroPrices.innerHTML = product.sizes.map((size) => `<span class="price-chip">${size.label} · ${size.price} ${state.settings.currency}</span>`).join('');

      gsap.fromTo([els.heroTitle, els.heroSubtitle, els.heroPrices], { y: 24, opacity: 0, filter: 'blur(10px)' }, { y: 0, opacity: 1, filter: 'blur(0px)', duration: .85, stagger: .08, ease: 'power3.out' });
      gsap.fromTo(els.heroImage, { scale: 1.08, opacity: .55 }, { scale: 1, opacity: 1, duration: 1.1, ease: 'power3.out' });
    }

    function rotateHero() {
      const featured = featuredProducts();
      state.heroIndex = (state.heroIndex + 1) % featured.length;
      renderHero(featured[state.heroIndex]);
    }

    function setCategory(categoryId) {
      state.activeCategory = categoryId;
      renderTabs();
      renderProducts();
      const firstProduct = productsForActiveCategory()[0];
      if (firstProduct) renderHero(firstProduct);
    }

    function updateClock() {
      const now = new Date();
      els.time.textContent = now.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
      els.date.textContent = now.toLocaleDateString('ar-SA', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    async function boot() {
      [state.categories, state.products, state.offers, state.settings] = await Promise.all([
        loadJson('data/categories.json'), loadJson('data/products.json'), loadJson('data/offers.json'), loadJson('data/settings.json')
      ]);
      state.activeCategory = state.categories[0].id;
      renderSettings(); renderOffers(); renderTabs(); renderProducts(); renderHero(featuredProducts()[0]); updateClock();
      setInterval(updateClock, 1000);
      state.heroTimer = setInterval(rotateHero, state.settings.heroIntervalMs);
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
      window.addEventListener('pointermove', (event) => {
        const x = (event.clientX / window.innerWidth - .5) * 18;
        const y = (event.clientY / window.innerHeight - .5) * 18;
        gsap.to('.hero-photo-wrap', { x, y, duration: .8, ease: 'power2.out' });
      });
    }

    window.addEventListener('load', () => {
      window.gsap = window.gsap || { to: () => null, fromTo: () => null };
      boot();
    });
  </script>
</body>
</html>
